name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint || true
      
      - name: Run TypeScript check
        run: npx tsc --noEmit || true

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build application
        run: npm run build || true
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist
          path: dist/
          retention-days: 7

  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      
      - name: Deploy to preview environment
        run: |
          echo "🚀 Deploying preview for PR #${{ github.event.pull_request.number }}"
          echo "Preview URL: https://preview.techscope.app/pr-${{ github.event.pull_request.number }}"
          # Aqui você integraria com Vercel, Netlify, AWS S3, etc.
          # Exemplo: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master'
    
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist/
      
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to production..."
          echo "Production URL: https://techscope.app"
          # Aqui você integraria com seu provedor de deploy
          # Exemplo: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }}
          # Exemplo: aws s3 sync dist/ s3://techscope-bucket --delete
